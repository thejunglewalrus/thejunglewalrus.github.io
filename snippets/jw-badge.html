<!--
  Junglewalrus "back to hub" badge.

  Drop-in HTML+CSS snippet — paste anywhere inside <body> of any tool that
  links from https://thejunglewalrus.github.io/. Self-contained (no JS).
  Walrus image is served from the hub repo's root so updates propagate to
  every tool automatically.

  Pinned `position: fixed` to bottom-right of viewport. Compact 56px circle
  by default, expands on hover to reveal "More tools" label. Bottom-right
  was chosen over top-right because most tools already have their own
  header content top-right (socials, GitHub links, etc).

  React / single-file projects (hell-rewards-picker): paste straight into
  index.html / index.template.html below <body>.
  SvelteKit / framework projects: paste into the root layout file.
-->

<a href="https://thejunglewalrus.github.io/" target="_blank" rel="noopener" class="jw-badge"
   title="More Lost Ark tools by Junglewalrus"
   aria-label="More Lost Ark tools by Junglewalrus">
  <img src="https://thejunglewalrus.github.io/walrus.png" alt="" width="48" height="48" />
  <span class="jw-badge-label">More tools</span>
</a>

<style>
  .jw-badge {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 1000;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 56px;
    width: 56px;
    padding: 4px;
    border-radius: 999px;
    background: #0e1320;
    border: 1px solid #c8a45c;
    color: #c8a45c;
    text-decoration: none;
    overflow: hidden;
    transition: width 0.22s ease-out, background 0.15s;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.55);
    box-sizing: border-box;
  }
  .jw-badge img {
    width: 48px; height: 48px;
    flex-shrink: 0;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }
  .jw-badge-label {
    white-space: nowrap;
    font: 600 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    letter-spacing: 0.02em;
    opacity: 0;
    padding-right: 14px;
    transition: opacity 0.12s 0.1s ease-in;
  }
  .jw-badge:hover, .jw-badge:focus-visible {
    width: 178px;
    background: rgba(14, 19, 32, 0.96);
    text-decoration: none;
  }
  .jw-badge:hover .jw-badge-label,
  .jw-badge:focus-visible .jw-badge-label { opacity: 1; }
  @media (max-width: 480px) {
    .jw-badge { bottom: 10px; right: 10px; }
  }
</style>
