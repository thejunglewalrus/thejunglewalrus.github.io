<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#0e1320"/>
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#c8a45c" stroke-width="1"/>
  <rect x="5" y="5" width="54" height="54" fill="none" stroke="#c8a45c" stroke-width="1"/>
  <!-- stylized walrus head: rounded head + two tusks -->
  <g fill="#c8a45c">
    <ellipse cx="32" cy="30" rx="14" ry="11"/>
    <circle cx="26" cy="27" r="1.8" fill="#0e1320"/>
    <circle cx="38" cy="27" r="1.8" fill="#0e1320"/>
    <!-- tusks -->
    <path d="M28 36 L26 48 L29 48 L30 36 Z"/>
    <path d="M36 36 L38 48 L35 48 L34 36 Z"/>
    <!-- snout -->
    <ellipse cx="32" cy="35" rx="4" ry="2.5" fill="#f0d27a"/>
  </g>
</svg>
